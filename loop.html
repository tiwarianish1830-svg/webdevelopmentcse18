<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditions in JS</title>
</head>
<body>
    <script>
        // conditonal statement : Conditional statements in Python are used to execute certain blocks of code based on specific conditions. 
        //These statements help control the flow of a program, making it behave differently in different situations.

        let age = 33;
        if(age>=18){
            console.log("Valid age for vote casting!");

        }

        //if........else

        if(age>=18){
            console.log("Valid Age");
        }

        else{
            console.log("Not Valid Age");
        }

        //switch case------------

        let grade='A';
        switch(grade){
            case'A':result="First Division";
            break;
            case'B':result="Second Division";
            break;
            case'C':result="Third Division";
            break;
            default:result="Fail";
        }

        console.log(result);

        //if elseif else.............

        let marks=35;
        if(marks>=60){
            console.log("First Division Marks");
        }

        else if(marks<60 && marks>=40){
            console.log("Second Division Marks");
        }

        else if(marks<40 && marks>=33){
            console.log("Third Division Marks");
        }

        else{
            console.log("Fail");
        }

    </script>
    
</body>
</html>
