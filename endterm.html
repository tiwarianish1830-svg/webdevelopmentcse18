<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse a Number</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }

        h2 {
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }

        #result {
            margin-top: 15px;
            font-size: 20px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Reverse a Number</h2>

    <input type="number" id="number" placeholder="Enter a number">

    <br>

    <button onclick="reverseNumber()">Reverse</button>

    <div id="result"></div>
</div>

<script>
function reverseNumber() {
    let num = parseInt(document.getElementById("number").value);

    if (isNaN(num)) {
        document.getElementById("result").innerHTML = "Please enter a valid number.";
        return;
    }

    let reverse = 0;

    while (num > 0) {
        let digit = num % 10;
        reverse = reverse * 10 + digit;
        num = Math.floor(num / 10);
    }

    document.getElementById("result").innerHTML =
        "Reversed Number: " + reverse;
}
</script>

</body>
</html>
